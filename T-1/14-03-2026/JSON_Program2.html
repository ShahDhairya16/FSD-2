<!--Display content on browser after 5 seconds-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id = 'p'></p>
    <script>
        setTimeout(()=>{
            document.getElementById('p').innerHTML = 'Displayed After 5 seconds';
        },5000);
    </script>
</body>
</html>
